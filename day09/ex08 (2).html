<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .wrap {
        position: relative;
        width: 200px;
        height: 200px;
        margin-top: 100px;

        img {
          width: 100%;
          max-width: 100%;

          height: 100%;
          object-fit: cover;
        }
      }

      .wrap-arrow {
        width: 200px;
        height: 200px;
        position: absolute;
        top: 0;
        left: 0;
      }

      .arrow {
        background-color: rgb(225, 224, 147);
        position: absolute;
        top: 50%;
        left: 0;
        transform: translate(-50%, -50%) rotate(-90deg);
        animation: arrowMove 4s infinite;
      }

      @keyframes arrowMove {
        0% {
          top: 0%;
          left: 50%;
          transform: translate(-50%, 0%) rotate(0deg);
        }
        12.5% {
          top: 0%;
          left: 100%;
          transform: translate(-100%, 0%) rotate(90deg);
        }
        25% {
          top: 50%;
          left: 100%;
          transform: translate(-100%, 50%) rotate(90deg);
        }

        50% {
          top: 100%;
          left: 100%;
          transform: translate(-100%, -100%) rotate(180deg);
        }
        62.5% {
          top: 0%;
          left: 100%;
          transform: translate(-100%, 0%) rotate(180deg);
        }
        75% {
          top: 50%;
          left: 100%;
          transform: translate(-100%, 50%) rotate(0deg);
        }

        87.5% {
          top: 0%;
          left: 50%;
          transform: translate(-50%, 0%) rotate(0deg);
        }
        100% {
          top: 0%;
          left: 100%;
          transform: translate(-100%, 0%) rotate(90deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="./Untitled.jpg" alt="" />
      <div class="wrap-arrow">
        <p class="arrow">=></p>
      </div>
    </div>
  </body>
</html>
