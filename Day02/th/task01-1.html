<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Quick View</title>
    <link rel="stylesheet" href="../styles/style01.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      html {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="product display-flex bg-white">
      <div class="product-imgs hover-effect">
        <img
          src="../imgs/headphone.png"
          alt="Razer Kraken Kitty Edt Gaming Headset Quartz"
          class="w-100"
        />
      </div>
      <div class="product-content display-flex">
        <p class="product-label">Free shipping</p>
        <h2 class="product-title">
          Razer Kraken Kitty Edt Gaming Headset Quartz
        </h2>
        <div class="price-group">
          <span class="old-price">1,599,000</span>
          <span class="price">799,000</span>
          <p class="price-desc">
            The offer is valid until April 3 or as long as stock lasts!
          </p>
        </div>
        <button class="btn btn-primary hover-effect">Add to cart</button>
        <p class="quantity">
          <i class="point"></i>
          50+ pcs. in stock.
        </p>
        <div class="btn-group display-flex">
          <button class="btn btn-secondary w-100 hover-effect bg-white">
            <i class="fa-solid fa-scale-balanced"></i>
            Add to cart
          </button>
          <button class="btn btn-secondary w-100 hover-effect bg-white">
            <i class="fa-regular fa-heart"></i>
            Add to wishlist
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
