<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link rel="stylesheet" href="../styles/style03.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="gallery w-80">
      <div class="title-container display-flex">
        <h1>Popular Collections</h1>
        <ul class="gallery-tag-list display-flex flex-between">
          <li>Profile</li>
          <li>New York</li>
          <li>Relaxing</li>
          <li>Person</li>
          <li>Fashion</li>
        </ul>
      </div>
      <ul class="gallery-body w-100">
        <li>
          <div class="main-cover">
            <img
              src="../imgs/task01_2/gallery_1/maincover_1.jpg"
              alt="Ảnh bìa chính"
            />
          </div>
          <ul class="sub-cover-list">
            <li>
              <img
                src="../imgs/task01_2/gallery_1/sub_cover_1.png"
                alt="Ảnh phụ 1"
              />
            </li>
            <li>
              <img
                src="../imgs/task01_2/gallery_1/sub_cover_2.png"
                alt="Ảnh phụ 2"
              />
            </li>
            <li>
              <img
                src="../imgs/task01_2/gallery_1/sub_cover_3.png"
                alt="Ảnh phụ 3"
              />
            </li>
          </ul>
          <div class="album-desc">
            <span>People</span>
            <div class="photo-count">
              <i class="fa-regular fa-image"></i>
              <span class="count-span">144</span>
            </div>
          </div>
        </li>

        <li>
          <div class="main-cover">
            <img src="https://picsum.photos/536/354" alt="Ảnh bìa chính" />
          </div>
          <ul class="sub-cover-list">
            <li>
              <img src="https://picsum.photos/536/354" alt="Ảnh phụ 1" />
            </li>
            <li>
              <img src="https://picsum.photos/536/354" alt="Ảnh phụ 2" />
            </li>
            <li>
              <img src="https://picsum.photos/536/354" alt="Ảnh phụ 3" />
            </li>
          </ul>
          <div class="album-desc">
            <span>People</span>
            <div class="photo-count">
              <i class="fa-regular fa-image"></i>
              <span class="count-span">144</span>
            </div>
          </div>
        </li>

        <li>
          <div class="main-cover">
            <img
              src="../imgs/task01_2/gallery_1/maincover_1.jpg"
              alt="Ảnh bìa chính"
            />
          </div>
          <ul class="sub-cover-list">
            <li>
              <img
                src="../imgs/task01_2/gallery_1/sub_cover_1.png"
                alt="Ảnh phụ 1"
              />
            </li>
            <li>
              <img
                src="../imgs/task01_2/gallery_1/sub_cover_2.png"
                alt="Ảnh phụ 2"
              />
            </li>
            <li>
              <img
                src="../imgs/task01_2/gallery_1/sub_cover_3.png"
                alt="Ảnh phụ 3"
              />
            </li>
          </ul>
          <div class="album-desc">
            <span>People</span>
            <div class="photo-count">
              <i class="fa-regular fa-image"></i>
              <span class="count-span">144</span>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </body>
</html>
