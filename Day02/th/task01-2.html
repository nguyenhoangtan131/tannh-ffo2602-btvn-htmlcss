<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="gallery">
      <div class="gallery-title">
        <h2>Popular Collections</h2>
        <ul>
          <li class="gallery-tags">Profile</li>
          <li class="gallery-tags">New York</li>
          <li class="gallery-tags">Relaxing</li>
          <li class="gallery-tags">Person</li>
          <li class="gallery-tags">Fashion</li>
        </ul>
      </div>
      <div class="gallery-body">
        <ul>
          <li class="album-groups">
            <div class="album-covers"></div>
            <div class="album-decs"></div>
          </li>
          <li class="album-groups"></li>
          <li class="album-groups"></li>
        </ul>
      </div>
    </div>
  </body>
</html>
