<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="./public/css/bai1.css" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>Bai 1</title>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }

      body {
        height: 2000px;
        display: flex;
        justify-content: center;
        background: #ededfa;
        font-family: "Mulish";
      }

      .purple-color-on-hover {
        --theme-color: #dde1f9;
      }
      .black-color-on-hover {
        --theme-color: #000000c5;
      }
      .container {
        position: fixed;
      }
      .navbar-container {
        width: 1225px;
        padding: 1rem;
        background: #fff;
        border-radius: 24px;
      }

      .navbar-main {
        display: flex;
        background: #f8f9ff;
        border-radius: 1.5rem;
        justify-content: space-between;
        padding: 2.8rem 2.5rem;
      }

      .nav-links {
        display: flex;
        justify-content: space-between;
        list-style: none;
      }

      .nav-item {
        padding: 1.25rem 1.5rem;
      }

      .nav-item:hover {
        border-radius: 20px;
        background: var(--theme-color);
      }

      .nav-link,
      .btn-login,
      .btn-signup {
        color: black;
        text-transform: uppercase;
        text-decoration: none;
        font-weight: bold;
      }

      .nav-actions {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.875rem;
        .btn-signup {
          padding: 1.125rem 1.75rem;
          color: #fff;
          border-radius: 5px;
          background-color: #000;
        }
      }

      .nav-actions,
      .btn-signup:hover {
        cursor: pointer;
        background-color: var(--theme-color);
      }

      .nav-item.active {
        position: relative;
      }

      .mega-menu {
        width: 389px;
        height: 333px;
        position: absolute;
        left: 0;
        display: none;
        background: #fff;
        padding: 2rem;
        border-radius: 15px;
      }

      .nav-item.active:hover .mega-menu {
        display: flex;
        justify-content: space-around;
      }

      .menu-column {
        .column-title {
          font-size: 1rem;
          font-weight: 900;
        }

        .menu-list {
          list-style: none;
          a {
            text-decoration: none;
            color: #000;
            font-weight: 18px;
            font-weight: 700;
          }
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <nav class="navbar-container">
        <div class="navbar-main">
          <ul class="nav-links">
            <li class="nav-item purple-color-on-hover">
              <a href="#" class="nav-link">Framework</a>
            </li>
            <li class="nav-item purple-color-on-hover">
              <a href="#" class="nav-link">Demos</a>
            </li>
            <li class="nav-item active purple-color-on-hover">
              <a href="#" class="nav-link">Resources</a>

              <div class="mega-menu">
                <div class="menu-column">
                  <span class="column-title">Top Controls</span>
                  <ul class="menu-list">
                    <li><a href="#">Grid</a></li>
                    <li><a href="#">Chart</a></li>
                    <li><a href="#">Controls</a></li>
                    <li><a href="#">Financial Chart</a></li>
                  </ul>
                </div>
                <div class="menu-column">
                  <span class="column-title">Top Controls</span>
                  <ul class="menu-list">
                    <li><a href="#">API</a></li>
                    <li><a href="#">Blogs</a></li>
                    <li><a href="#">Knowledge Base</a></li>
                    <li><a href="#">Videos</a></li>
                    <li><a href="#">Forums</a></li>
                    <li><a href="#">Licensing</a></li>
                  </ul>
                </div>
              </div>
            </li>
            <li class="nav-item purple-color-on-hover">
              <a href="#" class="nav-link">Documentation</a>
            </li>
          </ul>
          <div class="nav-actions">
            <a href="#" class="btn-login">Log In</a>
            <a href="#" class="btn-signup black-color-on-hover">Sign Up</a>
          </div>
        </div>
      </nav>
    </div>
  </body>
</html>
