<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Quick View</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="product">
      <div class="product-imgs">
        <img
          src="../imgs/headphone.png"
          alt="Razer Kraken Kitty Edt Gaming Headset Quartz"
        />
      </div>
      <div class="product-content">
        <p>Free shipping</p>
        <h2>Razer Kraken Kitty Edt Gaming Headset Quartz</h2>
        <div class="price-group">
          <p class="old-price">1,599,000</p>
          <div class="price">799,000</div>
          <p>The offer is valid until April 3 or as long as stock lasts!</p>
        </div>
        <button class="btn btn-primary">Add to cart</button>
        <p>
          <i class="point"></i>
          50+ pcs. in stock.
        </p>
        <div class="btn-group">
          <button class="btn btn-secondary">
            <i class="fa-solid fa-scale-balanced"></i>
            Add to cart
          </button>
          <button class="btn btn-secondary">
            <i class="fa-regular fa-heart"></i>
            Add to wishlist
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
